<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Special Birthday Wish ✨</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Quicksand:wght@500;700&display=swap"
        rel="stylesheet">
    <!-- GSAP for smooth animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #ffe5ec, #ffc2d1, #ffb3c6, #e8dbfc, #d6c5f7);
            --primary-pink: #ff758c;
            --purple-theme: #6a4c93;
            --white-glass: rgba(255, 255, 255, 0.22);
            --glass-border: rgba(255, 255, 255, 0.35);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: var(--bg-gradient);
            background-size: 300% 300%;
            animation: gradientAnim 18s ease infinite;
            font-family: 'Quicksand', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            padding: 20px;
        }

        @keyframes gradientAnim {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        #dustCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Ambient glowing orb */
        .ambient-orb {
            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 182, 193, 0.4) 0%, rgba(216, 191, 216, 0) 70%);
            filter: blur(40px);
            z-index: 0;
            pointer-events: none;
            animation: floatOrb 10s ease-in-out infinite alternate;
        }

        @keyframes floatOrb {
            0% {
                transform: translate(-80px, -50px) scale(1);
            }

            100% {
                transform: translate(80px, 50px) scale(1.2);
            }
        }

        /* Emojis background floating styling */
        .top-emoji,
        .side-item {
            position: absolute;
            pointer-events: none;
            z-index: 2;
            filter: drop-shadow(0 8px 10px rgba(255, 117, 140, 0.2));
            user-select: none;
        }

        .top-emoji {
            top: 30px;
            font-size: 2.2rem;
            animation: topEmojiFloat 5s ease-in-out infinite;
        }

        @keyframes topEmojiFloat {

            0%,
            100% {
                transform: translateY(0) rotate(0deg) scale(1);
            }

            50% {
                transform: translateY(-15px) rotate(12deg) scale(1.08);
            }
        }

        .side-decoration {
            position: absolute;
            height: 100vh;
            width: 80px;
            top: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            padding: 2rem 0;
            z-index: 2;
        }

        .side-decoration.left {
            left: 15px;
        }

        .side-decoration.right {
            right: 15px;
        }

        .side-item {
            position: relative;
            font-size: 2rem;
            animation: sideBounce 4s ease-in-out infinite;
            animation-delay: calc(var(--delay) * 1s);
        }

        @keyframes sideBounce {

            0%,
            100% {
                transform: translateX(0) scale(1);
            }

            50% {
                transform: translateX(12px) scale(1.1);
            }
        }

        /* Premium Glassmorphic Container */
        .glass-container {
            background: var(--white-glass);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            box-shadow: 0 15px 45px rgba(255, 105, 180, 0.15),
                inset 0 0 25px rgba(255, 255, 255, 0.4);
            padding: 3rem 2rem;
            width: 100%;
            max-width: 480px;
            text-align: center;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            z-index: 10;
        }

        .glass-container:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 60px rgba(255, 105, 180, 0.25),
                inset 0 0 35px rgba(255, 255, 255, 0.6);
            border-color: rgba(255, 255, 255, 0.55);
        }

        .glass-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 80%;
            height: 100%;
            background: linear-gradient(90deg,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.4) 50%,
                    rgba(255, 255, 255, 0) 100%);
            transform: skewX(-30deg);
            transition: 0.8s;
        }

        .glass-container:hover::before {
            animation: shineEffect 1.8s ease-in-out;
        }

        @keyframes shineEffect {
            100% {
                left: 180%;
            }
        }

        .message {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            color: var(--purple-theme);
            font-weight: 700;
            line-height: 1.4;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.6);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .message.hidden {
            display: none;
            opacity: 0;
        }

        .hidden {
            display: none !important;
            opacity: 0;
        }

        .name-input-wrapper {
            margin-top: 1.5rem;
            position: relative;
            display: inline-block;
            width: 85%;
            max-width: 300px;
            transition: opacity 0.5s ease, transform 0.5s ease;
            z-index: 20;
        }

        .name-input {
            width: 100%;
            padding: 12px 20px;
            font-family: 'Quicksand', sans-serif;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--purple-theme);
            background: rgba(255, 255, 255, 0.45);
            border: 2px solid rgba(255, 117, 140, 0.35);
            border-radius: 25px;
            outline: none;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .name-input:focus {
            background: rgba(255, 255, 255, 0.85);
            border-color: var(--primary-pink);
            box-shadow: 0 0 15px rgba(255, 117, 140, 0.35),
                inset 0 2px 4px rgba(0, 0, 0, 0.02);
            transform: scale(1.02);
        }

        .name-input::placeholder {
            color: rgba(106, 76, 143, 0.4);
            font-weight: 500;
        }

        /* Action elements styling */
        .enter-button {
            margin-top: 2rem;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            color: white;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            padding: 0.85rem 2rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 118, 140, 0.45);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(25px);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            z-index: 10;
        }

        .enter-button:hover {
            transform: translateY(-3px) scale(1.06);
            box-shadow: 0 12px 30px rgba(255, 118, 140, 0.6);
        }

        .enter-button:active {
            transform: scale(0.98);
        }

        .gif-container {
            margin-top: 2.2rem;
            width: 100%;
            max-width: 320px;
            height: 200px;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(106, 76, 147, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.5);
            opacity: 0;
            transform: translateY(25px);
            position: relative;
            z-index: 10;
            background: #fff;
        }

        .gif-placeholder {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Bubble decor */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.35);
            border-radius: 50%;
            box-shadow: inset 0 3px 6px rgba(255, 255, 255, 0.4), 0 5px 15px rgba(255, 255, 255, 0.1);
            animation: bubbleRise 16s linear infinite;
            pointer-events: none;
            z-index: 2;
        }

        @keyframes bubbleRise {
            0% {
                transform: translateY(105vh) scale(0.4);
                opacity: 0;
            }

            10% {
                opacity: 0.6;
            }

            90% {
                opacity: 0.4;
            }

            100% {
                transform: translateY(-120px) scale(1.1);
                opacity: 0;
            }
        }

        .heart {
            position: absolute;
            pointer-events: none;
            z-index: 99;
            filter: drop-shadow(0 4px 8px rgba(255, 0, 100, 0.25));
        }

        /* Responsiveness */
        @media (max-width: 768px) {
            .side-decoration {
                display: none;
            }

            .glass-container {
                padding: 2.5rem 1.5rem;
            }

            .message {
                font-size: 1.5rem;
            }

            .gif-container {
                height: 170px;
                max-width: 280px;
            }

            .top-emoji {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>

    <!-- Canvas for floating star dust particles -->
    <canvas id="dustCanvas"></canvas>

    <!-- Ambient background glowing design orbs -->
    <div class="ambient-orb" style="top: 15%; left: 10%;"></div>
    <div class="ambient-orb" style="bottom: 15%; right: 10%; animation-delay: -5s;"></div>

    <!-- Top floating decorative emojis -->
    <span class="top-emoji" style="left: 15%; animation-delay: 0.2s;">✨</span>
    <span class="top-emoji" style="left: 38%; animation-delay: 0.8s;">🎂</span>
    <span class="top-emoji" style="left: 62%; animation-delay: 0.5s;">🎀</span>
    <span class="top-emoji" style="left: 83%; animation-delay: 1.1s;">🌸</span>

    <!-- Side decorations - left -->
    <div class="side-decoration left">
        <span class="side-item" style="--delay: 0.2;">🌈</span>
        <span class="side-item" style="--delay: 0.7;">💖</span>
        <span class="side-item" style="--delay: 1.2;">🎁</span>
        <span class="side-item" style="--delay: 1.7;">🦄</span>
    </div>

    <!-- Side decorations - right -->
    <div class="side-decoration right">
        <span class="side-item" style="--delay: 0.4;">🌟</span>
        <span class="side-item" style="--delay: 0.9;">🍰</span>
        <span class="side-item" style="--delay: 1.4;">🎀</span>
        <span class="side-item" style="--delay: 1.9;">💝</span>
    </div>

    <div id="decorations"></div>

    <!-- Main container -->
    <div class="glass-container" id="messageContainer">
        <p class="message" id="initialMessage">✨ I have something for you... 💫</p>
        <p class="message hidden" id="secondMessage">🥺 It's a special day for me... 💕</p>
        <div class="name-input-wrapper hidden" id="nameInputWrapper">
            <input type="text" id="loveNameInput" class="name-input" placeholder="Enter their name..." value="">
        </div>
    </div>

    <button class="enter-button" id="enterButton">
        <span>✨</span>
        <span>Enter My Day</span>
        <span>💖</span>
    </button>

    <!-- GIF container -->
    <div class="gif-container" id="gifContainer">
        <img src="images/gif_1.gif" alt="Birthday celebration" class="gif-placeholder" id="gifPlaceholder">
    </div>

    <!-- Import our continuous shared music script -->
    <script src="music.js"></script>

    <script>
        // Create canvas dust particles
        function initStardust() {
            const canvas = document.getElementById('dustCanvas');
            const ctx = canvas.getContext('2d');
            let particles = [];

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            class DustParticle {
                constructor() {
                    this.reset();
                    this.y = Math.random() * canvas.height;
                }

                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = canvas.height + 20;
                    this.size = Math.random() * 2.5 + 0.6;
                    this.speedX = (Math.random() - 0.5) * 0.4;
                    this.speedY = -Math.random() * 0.7 - 0.2;
                    this.opacity = Math.random() * 0.5 + 0.2;
                    this.hue = Math.random() * 50 + 325; // Sweet pinks & purples
                }

                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.y < -20 || this.opacity <= 0) {
                        this.reset();
                    }
                }

                draw() {
                    ctx.save();
                    ctx.globalAlpha = this.opacity;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = `hsl(${this.hue}, 100%, 75%)`;
                    ctx.fillStyle = `hsl(${this.hue}, 100%, 85%)`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            for (let i = 0; i < 50; i++) {
                particles.push(new DustParticle());
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                requestAnimationFrame(animate);
            }
            animate();
        }

        // Create decorative floating bubbles
        function createBubbles() {
            const container = document.getElementById('decorations');
            for (let i = 0; i < 15; i++) {
                const bubble = document.createElement('div');
                bubble.classList.add('bubble');

                const size = Math.random() * 50 + 15;
                bubble.style.width = `${size}px`;
                bubble.style.height = `${size}px`;
                bubble.style.left = `${Math.random() * 90 + 5}%`;
                bubble.style.animationDuration = `${Math.random() * 8 + 12}s`;
                bubble.style.animationDelay = `${Math.random() * 10}s`;

                container.appendChild(bubble);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initStardust();
            createBubbles();

            const messageContainer = document.getElementById('messageContainer');
            const initialMessage = document.getElementById('initialMessage');
            const secondMessage = document.getElementById('secondMessage');
            const nameInputWrapper = document.getElementById('nameInputWrapper');
            const loveNameInput = document.getElementById('loveNameInput');
            const enterButton = document.getElementById('enterButton');
            const gifContainer = document.getElementById('gifContainer');

            let interacted = false;

            // Stop click propagation on text input to prevent double triggering interactions
            loveNameInput.addEventListener('click', (e) => {
                e.stopPropagation();
            });

            // Click listener for primary message container
            messageContainer.addEventListener('click', () => {
                if (interacted) return;
                interacted = true;

                // Fire up background music on first interaction (respects browser autoplay policies)
                if (window.birthdayMusic) {
                    if (window.birthdayMusic.audio.paused) {
                        window.birthdayMusic.togglePlay();
                    }
                }

                // Smoothly swap messages with GSAP
                gsap.to(initialMessage, {
                    opacity: 0,
                    y: -25,
                    duration: 0.6,
                    ease: "power2.inOut",
                    onComplete: () => {
                        initialMessage.classList.add('hidden');
                        secondMessage.classList.remove('hidden');
                        nameInputWrapper.classList.remove('hidden');
                        gsap.fromTo([secondMessage, nameInputWrapper],
                            { opacity: 0, y: 25 },
                            { opacity: 1, y: 0, duration: 0.6, ease: "power2.out", stagger: 0.15 }
                        );

                        // Bring in the call-to-action button
                        gsap.to(enterButton, {
                            opacity: 1,
                            y: 0,
                            duration: 0.8,
                            ease: "back.out(1.7)",
                            delay: 0.3
                        });

                        // Cascade the GIF entrance
                        gsap.to(gifContainer, {
                            opacity: 1,
                            y: 0,
                            duration: 0.8,
                            ease: "power2.out",
                            delay: 0.4
                        });
                    }
                });

                createHearts(18);
            });

            // Heart float generation helper
            function createHearts(count) {
                const emojis = ['❤️', '💖', '💕', '💓', '💗', '💘', '💝'];
                const containerRect = messageContainer.getBoundingClientRect();

                for (let i = 0; i < count; i++) {
                    setTimeout(() => {
                        const heart = document.createElement('div');
                        heart.className = 'heart';
                        heart.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                        heart.style.fontSize = `${Math.random() * 22 + 12}px`;

                        // Center placement relative to container
                        const startX = containerRect.left + (Math.random() * containerRect.width);
                        const startY = containerRect.top + (containerRect.height / 2);

                        heart.style.left = `${startX}px`;
                        heart.style.top = `${startY}px`;

                        document.body.appendChild(heart);

                        // Physics physics trail using GSAP
                        gsap.to(heart, {
                            y: -180 - Math.random() * 120,
                            x: (Math.random() - 0.5) * 140,
                            opacity: 0,
                            rotation: Math.random() * 100 - 50,
                            scale: 0.4,
                            duration: 2.2 + Math.random() * 1.5,
                            ease: "power2.out",
                            onComplete: () => heart.remove()
                        });
                    }, i * 70);
                }
            }

            // Redirect handler on "Enter My Day"
            enterButton.addEventListener('click', () => {
                createHearts(12);

                // Save the entered name in localStorage
                const loveName = loveNameInput.value.trim() || 'Sree';
                localStorage.setItem('birthday_love_name', loveName);

                // Extra visual burst on redirect
                gsap.to(document.body, {
                    backgroundColor: "#ffc2d1",
                    duration: 0.4
                });

                gsap.to(enterButton, {
                    scale: 0.9,
                    opacity: 0.5,
                    duration: 0.2,
                    onComplete: () => {
                        // Smoothly navigate away while fadeOut handles BGM fade (optional but nice)
                        window.location.href = "birthday.html";
                    }
                });
            });
        });
    </script>
</body>

</html>
