<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let's Celebrate with Cake!</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <!-- GSAP for advanced animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #ffcad4 0%, #ffd1e3 30%, #e0c3fc 70%, #bde0fe 100%);
            --cake-pink: #ff71b6;
            --cake-cream: #ffffff;
            --shadow-clr: rgba(255, 105, 180, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            background-size: 300% 300%;
            animation: bgShift 16s ease infinite;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Ambient blur spots */
        .glow-spot {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.5) 0%, rgba(255, 182, 193, 0) 70%);
            filter: blur(50px);
            z-index: 0;
            pointer-events: none;
        }

        #confettiCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .heading {
            font-family: 'Outfit', sans-serif;
            font-size: 3.5rem;
            font-weight: 800;
            color: #ff60ad;
            text-align: center;
            z-index: 10;
            margin-bottom: 0.5rem;
            text-shadow: 0 4px 15px rgba(255, 113, 178, 0.25),
                         0 0 25px rgba(255, 255, 255, 0.5);
            animation: textGlow 2.5s ease-in-out infinite alternate;
            user-select: none;
        }

        @keyframes textGlow {
            0% { text-shadow: 0 4px 15px rgba(255,113,178,0.2), 0 0 10px rgba(255,255,255,0.4); }
            100% { text-shadow: 0 6px 25px rgba(255,113,178,0.45), 0 0 25px rgba(255,100,180,0.6); }
        }

        /* Visual Instructions Box */
        .instruction-box {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 10px 24px;
            color: #7d4f9f;
            font-size: 1.15rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2rem;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.05);
            z-index: 10;
            user-select: none;
            transition: all 0.3s ease;
        }

        .mic-indicator-dot {
            width: 10px;
            height: 10px;
            background: #ff4797;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px #ff4797;
        }
        
        .mic-active .mic-indicator-dot {
            background: #00ff73;
            box-shadow: 0 0 12px #00ff73;
            animation: micPulse 1s infinite alternate;
        }

        @keyframes micPulse {
            0% { transform: scale(0.9); opacity: 0.7; }
            100% { transform: scale(1.3); opacity: 1; }
        }

        /* Beautiful 3D Cake Design */
        .cake-container {
            position: relative;
            width: 320px;
            height: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            cursor: pointer;
            z-index: 10;
            padding-bottom: 20px;
        }

        .cake-plate {
            width: 320px;
            height: 20px;
            background: linear-gradient(135deg, #ffffff 0%, #e6e6e6 100%);
            border-radius: 50%;
            box-shadow: 0 15px 30px rgba(0,0,0,0.12),
                        inset 0 2px 5px rgba(255,255,255,0.8);
            position: absolute;
            bottom: 0;
            z-index: 2;
        }

        .cake {
            position: relative;
            width: 260px;
            height: 240px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            transform-style: preserve-3d;
            transform: perspective(1000px) rotateX(12deg);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 3;
            bottom: 8px;
        }

        .cake:hover {
            transform: perspective(1000px) rotateX(12deg) scale(1.04) translateY(-4px);
        }

        /* Layers */
        .layer {
            position: absolute;
            background: linear-gradient(180deg, #ff8ac7 0%, #ff529c 100%);
            border-radius: 50% / 25%;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08),
                        inset 0 3px 10px rgba(255,255,255,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .layer-1 {
            width: 260px;
            height: 85px;
            bottom: 0;
            z-index: 1;
            background: linear-gradient(180deg, #ff8ac7 0%, #ff4fa1 100%);
        }

        .layer-2 {
            width: 220px;
            height: 75px;
            bottom: 50px;
            z-index: 2;
            background: linear-gradient(180deg, #ffacd4 0%, #ff7bb8 100%);
        }

        .layer-3 {
            width: 170px;
            height: 65px;
            bottom: 100px;
            z-index: 3;
            background: linear-gradient(180deg, #ffc7e6 0%, #ffa3cd 100%);
        }

        /* Splendid Cream Drips & Frostings */
        .cream-drip {
            position: absolute;
            width: 16px;
            height: 24px;
            background: #ffffff;
            border-radius: 0 0 10px 10px;
            top: 25px;
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.06);
        }

        .swirl {
            position: absolute;
            width: 22px;
            height: 14px;
            background: radial-gradient(circle at 50% 30%, #ffffff 0%, #ffdeee 100%);
            border-radius: 50%;
            top: -6px;
            box-shadow: 0 3px 5px rgba(255,105,180,0.25);
        }

        /* Sprinkle Details */
        .sprinkle {
            position: absolute;
            width: 6px;
            height: 12px;
            border-radius: 4px;
            opacity: 0.85;
        }

        /* Glowing interactive Candle */
        .candle {
            position: absolute;
            width: 14px;
            height: 65px;
            background: repeating-linear-gradient(
                45deg,
                #ffffff,
                #ffffff 8px,
                #ff5fa2 8px,
                #ff5fa2 16px
            );
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 8px 8px 3px 3px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15),
                        0 0 15px rgba(255,255,255,0.4);
            z-index: 10;
        }

        .wick {
            position: absolute;
            width: 2px;
            height: 10px;
            background: #222;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
        }

        .flame {
            position: absolute;
            width: 20px;
            height: 32px;
            background: radial-gradient(circle at 50% 80%, #ffea79 10%, #ff9600 50%, #ff4000 90%);
            border-radius: 50% 50% 25% 25%;
            top: -38px;
            left: 50%;
            transform: translateX(-50%);
            animation: flicker 0.15s infinite alternate;
            filter: drop-shadow(0 0 15px rgba(255, 120, 0, 0.8))
                    drop-shadow(0 0 35px rgba(255, 60, 0, 0.4));
            z-index: 11;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1) rotate(-1deg); }
            100% { transform: translateX(-50%) scale(0.92) rotate(1.5deg); }
        }

        /* Fading smoke visual */
        .smoke-puff {
            position: absolute;
            width: 12px;
            height: 12px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            filter: blur(4px);
            opacity: 0;
            pointer-events: none;
            z-index: 12;
        }

        /* Next Page action trigger */
        .next-page-button {
            position: fixed;
            bottom: 30px;
            padding: 16px 42px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ff8ac7 0%, #ff5c9f 100%);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(255, 92, 159, 0.4),
                        0 0 40px rgba(255, 92, 159, 0.25);
            z-index: 99;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            user-select: none;
        }

        .next-page-button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 30px rgba(255, 92, 159, 0.6);
        }

        .next-page-button:active {
            transform: scale(0.97);
        }

        .next-page-button.show {
            opacity: 1;
            transform: translateY(0);
            animation: floatBtn 2s infinite ease-in-out alternate;
        }

        @keyframes floatBtn {
            0% { transform: translateY(0); }
            100% { transform: translateY(-6px); }
        }
    </style>
</head>
<body>

    <div class="glow-spot" style="top: 10%; left: 15%;"></div>
    <div class="glow-spot" style="bottom: 10%; right: 15%; animation-delay: -4s;"></div>

    <h1 class="heading">Let's Cut the Cake! 🎂</h1>

    <!-- Visual instructions with Mic Active status -->
    <div class="instruction-box" id="instructionBox">
        <span class="mic-indicator-dot"></span>
        <span id="instructionText">Blow into your mic or click the cake! 💨</span>
    </div>

    <!-- 3D Layered Cake -->
    <div class="cake-container" id="cakeGroup">
        <div class="cake-plate"></div>
        <div class="cake" id="interactiveCake">
            
            <!-- Bottom Layer 1 -->
            <div class="layer layer-1">
                <div class="cream-drip" style="left: 20px; height: 18px;"></div>
                <div class="cream-drip" style="left: 65px; height: 26px;"></div>
                <div class="cream-drip" style="left: 120px; height: 22px;"></div>
                <div class="cream-drip" style="left: 175px; height: 28px;"></div>
                <div class="cream-drip" style="right: 25px; height: 16px;"></div>
            </div>

            <!-- Middle Layer 2 -->
            <div class="layer layer-2">
                <div class="swirl" style="left: 15px;"></div>
                <div class="swirl" style="left: 55px;"></div>
                <div class="swirl" style="left: 95px;"></div>
                <div class="swirl" style="left: 135px;"></div>
                <div class="swirl" style="right: 15px;"></div>
            </div>

            <!-- Top Layer 3 -->
            <div class="layer layer-3">
                <div class="swirl" style="left: 10px;"></div>
                <div class="swirl" style="left: 45px;"></div>
                <div class="swirl" style="left: 80px;"></div>
                <div class="swirl" style="right: 10px;"></div>
                
                <!-- Glowing Candle Structure -->
                <div class="candle" id="birthdayCandle">
                    <div class="wick"></div>
                    <div class="flame" id="candleFlame"></div>
                </div>
            </div>

        </div>
    </div>

    <!-- Navigation toggle -->
    <button class="next-page-button" id="nextPageBtn">
        <span>Open Card</span>
        <span>💖</span>
    </button>

    <canvas id="confettiCanvas"></canvas>

    <!-- Continuous background music engine -->
    <script src="music.js"></script>

    <script>
        const cake = document.getElementById('cakeGroup');
        const interactiveCake = document.getElementById('interactiveCake');
        const candle = document.getElementById('birthdayCandle');
        const flame = document.getElementById('candleFlame');
        const canvas = document.getElementById('confettiCanvas');
        const ctx = canvas.getContext('2d');
        const instructionBox = document.getElementById('instructionBox');
        const instructionText = document.getElementById('instructionText');

        let isBlown = false;
        let confettiParticles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Populate beautiful sprinkles automatically onto the cake layers
        function populateSprinkles() {
            const layers = document.querySelectorAll('.layer');
            const colors = ['#fff', '#ff5390', '#ffd84c', '#4df3ff', '#b477ff'];
            
            layers.forEach(layer => {
                const layerWidth = layer.offsetWidth;
                const sprinkleCount = Math.floor(layerWidth / 8);
                
                for (let i = 0; i < sprinkleCount; i++) {
                    const sprinkle = document.createElement('div');
                    sprinkle.className = 'sprinkle';
                    sprinkle.style.background = colors[Math.floor(Math.random() * colors.length)];
                    sprinkle.style.left = `${Math.random() * (layerWidth - 20) + 10}px`;
                    sprinkle.style.top = `${Math.random() * 20 + 20}px`;
                    sprinkle.style.transform = `rotate(${Math.random() * 180}deg)`;
                    layer.appendChild(sprinkle);
                }
            });
        }
        populateSprinkles();

        // 1. Confetti Particle System
        class Confetti {
            constructor(x, y) {
                this.x = x || canvas.width / 2;
                this.y = y || canvas.height / 2;
                this.size = Math.random() * 10 + 6;
                this.angle = Math.random() * Math.PI * 2;
                // Shoot upwards and outwards
                this.speed = Math.random() * 8 + 6;
                this.vx = Math.cos(this.angle) * this.speed * 1.5;
                this.vy = -Math.abs(Math.sin(this.angle) * this.speed * 2) - 3;
                this.gravity = 0.22;
                this.friction = 0.97;
                this.hue = Math.random() * 360;
                this.shape = Math.random() > 0.6 ? (Math.random() > 0.5 ? 'heart' : 'star') : 'ribbon';
                this.opacity = 1;
                this.rotation = Math.random() * Math.PI;
                this.rotationSpeed = (Math.random() - 0.5) * 0.15;
            }

            update() {
                this.vx *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotationSpeed;
                
                if (this.y > canvas.height) {
                    this.opacity -= 0.02;
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.fillStyle = `hsl(${this.hue}, 100%, 65%)`;

                if (this.shape === 'heart') {
                    // Vector heart confetti
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.bezierCurveTo(this.size / 2, -this.size / 3, this.size, -this.size / 3, 0, -this.size);
                    ctx.bezierCurveTo(-this.size, -this.size / 3, -this.size / 2, -this.size / 3, 0, 0);
                    ctx.fill();
                } else if (this.shape === 'star') {
                    // Vector 5-point star confetti
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        ctx.lineTo(Math.cos((18 + i * 72) * Math.PI / 180) * this.size, -Math.sin((18 + i * 72) * Math.PI / 180) * this.size);
                        ctx.lineTo(Math.cos((54 + i * 72) * Math.PI / 180) * (this.size/2), -Math.sin((54 + i * 72) * Math.PI / 180) * (this.size/2));
                    }
                    ctx.closePath();
                    ctx.fill();
                } else {
                    // Standard ribbon confetti
                    ctx.fillRect(-this.size/2, -this.size/4, this.size, this.size/2);
                }
                ctx.restore();
            }
        }

        function triggerConfettiBurst() {
            const cakeRect = interactiveCake.getBoundingClientRect();
            const sourceX = cakeRect.left + cakeRect.width / 2;
            const sourceY = cakeRect.top;

            for (let i = 0; i < 180; i++) {
                confettiParticles.push(new Confetti(sourceX, sourceY));
            }
            
            // Continuous extra sprinkles
            const extraSprinkles = setInterval(() => {
                if (confettiParticles.length > 300) return;
                for (let i = 0; i < 8; i++) {
                    confettiParticles.push(new Confetti(Math.random() * canvas.width, -10));
                }
            }, 300);

            setTimeout(() => clearInterval(extraSprinkles), 5000);
        }

        function renderConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < confettiParticles.length; i++) {
                confettiParticles[i].update();
                confettiParticles[i].draw();
                if (confettiParticles[i].opacity <= 0) {
                    confettiParticles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(renderConfetti);
        }
        requestAnimationFrame(renderConfetti);

        // 2. Extinguish candle celebration sequence
        function blowOutCandle() {
            if (isBlown) return;
            isBlown = true;

            // Generate smoke puff sequence
            const flameRect = flame.getBoundingClientRect();
            for (let i = 0; i < 6; i++) {
                const puff = document.createElement('div');
                puff.className = 'smoke-puff';
                puff.style.left = `${flameRect.left + i*4 - 8}px`;
                puff.style.top = `${flameRect.top - 15}px`;
                document.body.appendChild(puff);
                
                gsap.to(puff, {
                    y: -40 - Math.random()*20,
                    x: (Math.random() - 0.5)*40,
                    opacity: 0,
                    scale: 3,
                    duration: 1 + Math.random()*0.8,
                    onComplete: () => puff.remove()
                });
            }

            // Extinguish flame smoothly with GSAP
            gsap.to(flame, {
                opacity: 0,
                scale: 0,
                duration: 0.4,
                ease: "power2.out",
                onComplete: () => flame.remove()
            });

            // Gentle visual vibration to cake
            gsap.to(interactiveCake, {
                y: 8,
                duration: 0.15,
                yoyo: true,
                repeat: 3
            });

            // Trigger beautiful explosions!
            triggerConfettiBurst();

            // Swap instructions
            instructionText.innerText = "Wish made successfully! 💖";
            instructionBox.style.background = "rgba(0, 255, 115, 0.15)";
            instructionBox.style.borderColor = "rgba(0, 255, 115, 0.4)";
            instructionBox.style.color = "#007c37";

            // Bring up the next page visual action button
            setTimeout(() => {
                const nextButton = document.getElementById('nextPageBtn');
                nextButton.classList.add('show');
            }, 1800);
        }

        // Tap-to-blow interaction fallback
        cake.addEventListener('click', blowOutCandle);

        // 3. Web Audio Microphone detection
        async function initMicrophoneBlowDetection() {
            try {
                // Request brief audio mic stream
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                
                instructionBox.classList.add('mic-active');
                instructionText.innerText = "Listening for your breath... Blow or click!";

                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // AudioContext is suspended by default on load in most modern browsers.
                // We add page interaction listeners to automatically resume it.
                const resumeAudio = async () => {
                    if (audioContext.state === 'suspended') {
                        await audioContext.resume();
                    }
                };
                document.addEventListener('click', resumeAudio);
                document.addEventListener('touchstart', resumeAudio);

                const mediaStreamSource = audioContext.createMediaStreamSource(stream);
                const analyser = audioContext.createAnalyser();
                
                analyser.fftSize = 512;
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                
                mediaStreamSource.connect(analyser);

                let blowCount = 0;

                function checkBlow() {
                    if (isBlown) {
                        // Stop tracks to release microphone lock once blown successfully
                        stream.getTracks().forEach(track => track.stop());
                        document.removeEventListener('click', resumeAudio);
                        document.removeEventListener('touchstart', resumeAudio);
                        return;
                    }

                    analyser.getByteFrequencyData(dataArray);
                    
                    // Blow is low-frequency wind noise.
                    // Instead of averaging the entire 256 frequency bins (which will be mostly quiet),
                    // we sum energy in the low-frequency band (bins 0 to 10, corresponding to < ~860Hz).
                    let lowFreqEnergy = 0;
                    const lowFreqCount = 10;
                    for (let i = 0; i < lowFreqCount; i++) {
                        lowFreqEnergy += dataArray[i];
                    }
                    const averageVolume = lowFreqEnergy / lowFreqCount;

                    // Blow sound thresholds: sustained low-frequency loudness above average
                    if (averageVolume > 50) {
                        blowCount++;
                        // If blowing noise is sustained for ~100ms
                        if (blowCount > 6) {
                            blowOutCandle();
                        }
                    } else {
                        blowCount = Math.max(0, blowCount - 1);
                    }

                    requestAnimationFrame(checkBlow);
                }

                checkBlow();
            } catch (err) {
                console.log("Microphone access declined or unavailable. Falling back to tap-to-blow.", err);
            }
        }

        // Initialize Web Audio mic trigger once document is ready
        window.addEventListener('load', () => {
            initMicrophoneBlowDetection();
        });

        // Next page redirect transition
        document.getElementById('nextPageBtn').addEventListener('click', () => {
            gsap.to(document.body, {
                opacity: 0,
                scale: 0.95,
                duration: 0.5,
                onComplete: () => {
                    window.location.href = "final.html";
                }
            });
        });
    </script>
</body>
</html>
